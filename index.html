<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Monthly Bills</title>
    <link rel="stylesheet" href="./assets/index-BWl0HG37.css">
    <style>
      #boot-error {
        display:none; position:fixed; inset:16px; z-index:99999; overflow:auto;
        background:#111827; color:#f9fafb; border:1px solid #374151; border-radius:12px;
        padding:16px; font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
        white-space:pre-wrap;
      }
      #boot-error h1 { margin:0 0 8px; font-size:18px; }
      #boot-error p { margin:0 0 10px; color:#d1d5db; }
    </style>
    <script>
      (function() {
        function show(msg) {
          var el = document.getElementById('boot-error');
          if (!el) return;
          el.style.display = 'block';
          el.querySelector('[data-error-body]').textContent = String(msg || 'Unknown boot error');
        }
        window.addEventListener('error', function(ev) {
          show((ev.error && ev.error.stack) || ev.message || 'Script error');
        });
        window.addEventListener('unhandledrejection', function(ev) {
          var reason = ev.reason;
          show((reason && reason.stack) || (typeof reason === 'string' ? reason : JSON.stringify(reason, null, 2)) || 'Unhandled promise rejection');
        });
        window.__bootWatchdog = setTimeout(function() {
          var root = document.getElementById('root');
          if (!root) return;
          var txt = (root.textContent || '').trim();
          if (!root.children.length && !txt) {
            show('The app script did not finish booting. A startup error occurred before render.');
          }
        }, 4000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-error"><h1>Family Monthly Bills failed to start</h1><p>If this appears, the app hit a real startup error instead of silently showing a blank page.</p><div data-error-body></div></div>
    <script defer src="./assets/index-DiYyZVPW.js"></script>
  </body>
</html>
